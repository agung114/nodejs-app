apiVersion: apps/v1
kind: Deployment

metadata:
  name: nodejs-app
  annotations:
    kubernetes.io/change-cause: "initial deploy v2"

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nodejs-app

  template:
    metadata:
      labels:
        app: nodejs-app

    spec:
      containers:
      - name: nodejs-app

        image: agung114/nodejs-app:v3

        ports:
        - containerPort: 3000
